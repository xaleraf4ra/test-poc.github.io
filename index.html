<!DOCTYPE html>
<html>
<head><title>Flipster PoC</title></head>
<body>
    <h2>Flipster Intent Redirection PoC</h2>

    <a href="https://flipster.io/https://xaleraf4ra.github.io/test-poc.github.io/">
        Open via direct link
    </a>

    <br><br>

    <a href="intent://flipster.io/https://xaleraf4ra.github.io/test-poc.github.io/#Intent;scheme=https;package=com.prestolabs.android.prex;component=com.prestolabs.android.prex/.presentations.ui.MainActivity;action=android.intent.action.VIEW;end">
        Open via Intent scheme
    </a>

    <br><br>

    <button onclick="openApp()">Open via JS redirect</button>

    <script>
    function openApp() {
        window.location = "intent://flipster.io/https://xaleraf4ra.github.io/test-poc.github.io/#Intent;scheme=https;package=com.prestolabs.android.prex;component=com.prestolabs.android.prex/.presentations.ui.MainActivity;action=android.intent.action.VIEW;end";
    }
    </script>
</body>
</html>
